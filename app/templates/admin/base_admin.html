{% extends "base.html" %}
{% block content %}
<section class="section-sm">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="card-glass p-3">
          <h6 class="px-2 mb-3"><i class="bi bi-speedometer2 me-2"></i>Administration</h6>
          <ul class="list-unstyled">
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('admin.dashboard') }}"><i class="bi bi-grid me-2"></i>Dashboard</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('admin.articles') }}"><i class="bi bi-journal-text me-2"></i>Articles</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('admin.projects') }}"><i class="bi bi-kanban me-2"></i>Projets</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('admin.messages') }}"><i class="bi bi-envelope me-2"></i>Messages</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('admin.mobile_install') }}"><i class="bi bi-phone me-2"></i>Installation Mobile</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('admin.notifications_page') }}"><i class="bi bi-bell me-2"></i>Notifications</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none" href="{{ url_for('home.index') }}"><i class="bi bi-globe me-2"></i>Voir le site</a></li>
            <li><a class="d-block px-2 py-2 rounded-chere text-decoration-none text-danger" href="{{ url_for('admin.logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Déconnexion</a></li>
          </ul>
        </div>
      </div>
      <div class="col-lg-9">
        {% block admin_content %}{% endblock %}
      </div>
    </div>
  </div>
</section>
{% endblock %}
